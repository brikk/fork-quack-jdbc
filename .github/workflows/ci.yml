name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write  # required for the github-release job to upload assets

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install DuckDB CLI
        env:
          DUCKDB_VERSION: 1.5.5
        run: |
          curl -sSL https://install.duckdb.org | sh
          echo "$HOME/.duckdb/cli/${DUCKDB_VERSION}" >> "$GITHUB_PATH"
          "$HOME/.duckdb/cli/${DUCKDB_VERSION}/duckdb" --version

      - name: Build and run all tests
        run: mvn --batch-mode --no-transfer-progress verify

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/

  publish:
    name: Publish to Maven Central
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17 with Central credentials
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.KOTLIN_TOOLCHAIN_SIGNING_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Deploy
        env:
          MAVEN_USERNAME: ${{ secrets.KOTLIN_TOOLCHAIN_MAVEN_CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.KOTLIN_TOOLCHAIN_MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.KOTLIN_TOOLCHAIN_SIGNING_PASSPHRASE }}
        run: mvn --batch-mode --no-transfer-progress -Prelease deploy -DskipTests

  github-release:
    name: Attach jars to GitHub Release
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Package versioned + sources + javadoc jars
        run: mvn --batch-mode --no-transfer-progress -Prelease package -DskipTests

      - name: Derive version and copy un-versioned jars
        id: artifacts
        run: |
          set -euo pipefail
          VERSION=$(mvn --batch-mode --no-transfer-progress \
                       -q -Dexec.executable=echo -Dexec.args='${project.version}' \
                       --non-recursive exec:exec)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          mkdir -p release
          cp "target/quack-jdbc-${VERSION}.jar"          "release/quack-jdbc-${VERSION}.jar"
          cp "target/quack-jdbc-${VERSION}.jar"          "release/quack-jdbc.jar"
          if [ -f "target/quack-jdbc-${VERSION}-sources.jar" ]; then
            cp "target/quack-jdbc-${VERSION}-sources.jar"  "release/quack-jdbc-${VERSION}-sources.jar"
            cp "target/quack-jdbc-${VERSION}-sources.jar"  "release/quack-jdbc-sources.jar"
          fi
          if [ -f "target/quack-jdbc-${VERSION}-javadoc.jar" ]; then
            cp "target/quack-jdbc-${VERSION}-javadoc.jar"  "release/quack-jdbc-${VERSION}-javadoc.jar"
            cp "target/quack-jdbc-${VERSION}-javadoc.jar"  "release/quack-jdbc-javadoc.jar"
          fi
          (cd release && sha256sum * > SHA256SUMS)
          ls -la release/

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          # Strip the leading 'v' from the tag (refs/tags/v1.2.3 -> 1.2.3)
          # and pull the matching "## [VERSION] ..." section out of
          # CHANGELOG.md (stop at the next "## [" heading). Save to
          # release_notes.md; fall back to auto-generated notes if the
          # section is missing so the release still gets created.
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Extracting release notes for version: ${VERSION}"
          awk -v ver="${VERSION}" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release_notes.md

          if [ -s release_notes.md ]; then
            echo "have_notes=true" >> "$GITHUB_OUTPUT"
            echo "---- release_notes.md ----"
            cat release_notes.md
          else
            echo "have_notes=false" >> "$GITHUB_OUTPUT"
            echo "WARNING: no matching CHANGELOG section for ${VERSION}; release will use auto-generated notes."
          fi

      - name: Create / update GitHub Release with assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.changelog.outputs.have_notes == 'true' && 'release_notes.md' || '' }}
          generate_release_notes: ${{ steps.changelog.outputs.have_notes != 'true' }}
          files: |
            release/quack-jdbc-${{ steps.artifacts.outputs.version }}.jar
            release/quack-jdbc.jar
            release/quack-jdbc-${{ steps.artifacts.outputs.version }}-sources.jar
            release/quack-jdbc-sources.jar
            release/quack-jdbc-${{ steps.artifacts.outputs.version }}-javadoc.jar
            release/quack-jdbc-javadoc.jar
            release/SHA256SUMS
          fail_on_unmatched_files: false
