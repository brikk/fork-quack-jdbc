name: Publish SNAPSHOT

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  snapshot:
    name: Deploy SNAPSHOT to Maven Central
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17 with Central credentials
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Deploy SNAPSHOT
        env:
          MAVEN_USERNAME: ${{ secrets.KOTLIN_TOOLCHAIN_MAVEN_CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.KOTLIN_TOOLCHAIN_MAVEN_CENTRAL_PASSWORD }}
        run: mvn --batch-mode --no-transfer-progress deploy -DskipTests
